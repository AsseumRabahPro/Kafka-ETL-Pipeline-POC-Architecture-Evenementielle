name: Integration Tests

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  integration:
    name: Full Pipeline Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Docker services (Kafka + PostgreSQL)
        run: docker compose up -d

      - name: Wait for PostgreSQL to be healthy
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 30); do
            if docker compose exec -T postgres pg_isready -U etl_user -d etl_db; then
              echo "PostgreSQL ready."
              break
            fi
            echo "  Attempt $i/30 - not ready yet..."
            sleep 3
          done

      - name: Wait for Kafka to be ready
        run: |
          echo "Waiting for Kafka broker..."
          for i in $(seq 1 30); do
            if docker compose exec -T kafka kafka-broker-api-versions --bootstrap-server localhost:9092 2>/dev/null; then
              echo "Kafka ready."
              break
            fi
            echo "  Attempt $i/30 - not ready yet..."
            sleep 5
          done

      - name: Initialize database schema
        run: python init_db.py

      - name: Create Kafka topics
        run: python create_topics.py

      - name: Start workers in background
        run: |
          python worker_python/worker.py > /tmp/worker.log 2>&1 &
          python worker_python/order_validator.py > /tmp/order_validator.log 2>&1 &
          python worker_python/order_fact_builder.py > /tmp/order_fact_builder.log 2>&1 &
          echo "Workers started. Waiting for them to initialize..."
          sleep 5

      - name: Run producer (100 events)
        run: python producer/producer.py

      - name: Wait for data to be processed
        run: python wait_for_data.py

      - name: Run integration tests
        run: python full_test.py

      - name: Show KPI dashboard
        run: python kpi_orders.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: worker-logs
          path: |
            /tmp/worker.log
            /tmp/order_validator.log
            /tmp/order_fact_builder.log

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
